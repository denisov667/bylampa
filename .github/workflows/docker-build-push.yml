name: Build & Push Bylampa Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bylampa:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bylampa:${{ github.sha }}
          build-args: |
            domain=${{ secrets.BYLAMPA_DOMAIN }}
          platforms: linux/amd64,linux/arm64  # поддержка amd64 и arm64 (Raspberry, etc.)
          cache-from: type=gha
          cache-to: type=gha,mode=max
